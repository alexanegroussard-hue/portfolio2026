<link href="https://fonts.googleapis.com/css2?family=Averia+Serif+Libre:wght@400;700&display=swap" rel="stylesheet">

<style>
  /* --- 1. CONFIGURATION PC (Par défaut) --- */
  nav {
    height: 120px;
    background: white;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 4vw;
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    border-bottom: 1px solid #f0f0f0;
    font-family: 'Averia Serif Libre', serif;
  }

  .logo-group {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    color: #000;
  }

  .logo-img {
    height: 60px !important;
    width: auto !important;
  }

  .brand-name {
    font-weight: 900;
    font-size: 2.5rem;
  }

  .nav-right {
    display: flex; /* Visible sur PC */
    align-items: center;
    gap: 35px;
  }

  .nav-links {
    display: flex;
    gap: 30px;
  }

  .nav-links a {
    text-decoration: none;
    color: #000;
    font-size: 2rem;
    font-weight: 600;
  }

  .burger {
    display: none; /* CACHÉ SUR PC */
  }

  /* --- 2. CONFIGURATION MOBILE (Uniquement sous 768px) --- */
  @media (max-width: 768px) {
    nav {
      height: 70px;
      padding: 0 5vw;
    }

    .brand-name { font-size: 1.5rem; }
    .logo-img { height: 40px !important; }

    .burger {
      display: flex; /* APPARAÎT SUR MOBILE */
      flex-direction: column;
      justify-content: space-between;
      width: 24px;
      height: 16px;
      background: none;
      border: none;
      cursor: pointer;
    }

    .burger span {
      display: block;
      height: 2px;
      width: 100%;
      background: #000;
      transition: 0.3s;
    }

    .nav-right {
      display: none; /* CACHÉ SUR MOBILE PAR DÉFAUT */
      position: absolute;
      top: 70px; left: 0; right: 0;
      background: white;
      flex-direction: column;
      padding: 1.5rem 5vw;
      border-bottom: 1px solid #f0f0f0;
      align-items: flex-start !important;
    }

    .nav-right.open {
      display: flex !important; /* S'AFFICHE QUAND ON CLIQUE */
    }

    .nav-links {
      flex-direction: column;
      gap: 1.2rem;
      align-items: flex-start; 
    width: 100%;
    }

    .nav-links a { font-size: 1.2rem; }

    /* Animation de la croix */
    .burger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .burger.open span:nth-child(2) { opacity: 0; }
    .burger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
  }
</style>

<nav>
  <a href="index.html" class="logo-group">
    <img src="./logo.png" class="logo-img">
    <span class="brand-name">alexane</span>
  </a>

  <button class="burger" id="burger" aria-label="Menu">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <div class="nav-right" id="nav-right">
    <div class="nav-links">
      <a href="profil.html">profil</a>
      <a href="contact.html">contact</a>
    </div>
  </div>
</nav>
